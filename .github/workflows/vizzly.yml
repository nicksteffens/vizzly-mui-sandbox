name: Vizzly Visual Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Storybook visual tests
        run: npm run vizzly:storybook
        env:
          VIZZLY_TOKEN: ${{ secrets.VIZZLY_TOKEN }}

      - name: Cypress component visual tests
        run: npx vizzly tdd run "npx cypress run --component -q"
        env:
          VIZZLY_TOKEN: ${{ secrets.VIZZLY_TOKEN }}
